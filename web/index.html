<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bot Game Dashboard</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="dashboard-container">
      <header class="dashboard-header">
        <h1>Bot Game Live Dashboard</h1>
        <label class="control-toggle">
          <input type="checkbox" id="autoscroll" checked />
          <span>Auto-Scroll</span>
        </label>
      </header>
      <main class="dashboard-main">
        <aside class="sidebar">
          <div class="sidebar-stats">
            <div class="stat-main">
              <span class="stat-label">Connected Bots</span>
              <span class="stat-value" id="total-bots">0</span>
            </div>
            <div class="stat-main">
              <span class="stat-label">Total sMoltz</span>
              <span class="stat-value" id="total-smoltz">0</span>
            </div>
            <div class="stat-breakdown">
              <div class="breakdown-item">
                Playing: <span id="bots-playing">0</span>
              </div>
              <div class="breakdown-item">
                Matching: <span id="bots-matching">0</span>
              </div>
              <div class="breakdown-item">
                Free Room: <span id="bots-free">0</span>
              </div>
              <div class="breakdown-item">
                Paid Room: <span id="bots-paid">0</span>
              </div>
            </div>
          </div>
          <input type="text" id="search-bot" placeholder="Search bot name..." />
          <div class="tabs-container" id="tabs"></div>
        </aside>
        <section class="logs-viewport" id="viewport">
          <div
            class="viewport-header"
            id="viewport-header"
            style="display: none"
          >
            <h2 id="viewport-title">Agent Logs</h2>
            <button id="copy-logs-btn" class="copy-btn">Copy Logs</button>
          </div>
          <div class="placeholder-msg" id="placeholder">
            Waiting for agent websocket updates...
          </div>
          <div id="log-cards-container" class="cards-container"></div>
        </section>
      </main>
    </div>
    <script src="app.js"></script>
  </body>
</html>
